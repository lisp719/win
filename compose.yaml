services:
  archlinux:
    image: archlinux
    command: sleep infinity
    volumes:
      - .:/workspace
    working_dir: /workspace/archlinux
  fedora:
    image: fedora
    command: sleep infinity
    volumes:
      - .:/workspace
    working_dir: /workspace/fedora
  ubuntu:
    build:
      context: .
      dockerfile: ubuntu/Dockerfile.dev
    command: sleep infinity
    volumes:
      - .:/workspace
    working_dir: /workspace/ubuntu
