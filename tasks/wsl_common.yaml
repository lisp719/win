- name: Install common packages
  become: true
  package:
    name:
      - curl
      - git
      - htop
      - wget
    state: latest

- name: Install pkgx
  shell: curl https://pkgx.sh | sh
  args:
    creates: /usr/local/bin/pkgx

- name: Check if pkgx file exists
  stat:
    path: /usr/local/bin/pkgx
  register: pkgx_stat

- name: Install packages via pkgx shims
  shell: pkgm shim {{ item }}
  loop:
    - bat
    - delta
    - dua
    - fd
    - fzf
    - gh
    - jj
    - lazydocker
    - lazygit
    - node
    - npm
    - rg
    - starship
    - task
    - yazi
    - zellij
    - zoxide
  args:
    creates: /home/lisp719/.local/bin/{{ item }}
  when: pkgx_stat.stat.exists

- name: Create directories
  file:
    path: "{{ item }}"
    state: directory
  loop:
    - ~/.bashrc.d
    - ~/.codex
    - ~/.copilot
    - ~/.config/gh
    - ~/.config/jj
    - ~/.config/opencode
    - ~/.config/zellij
    - ~/workspaces

- name: Copy AGENTS.md
  copy:
    src: "{{ playbook_dir }}/../settings/common/AGENTS.md"
    dest: "{{ item }}"
  loop:
    - ~/.copilot/copilot-instructions.md
    - ~/.config/opencode/AGENTS.md
    - ~/.codex/AGENTS.md

- name: Copy codex seed config (first install only)
  copy:
    src: "{{ playbook_dir }}/../settings/wsl/.codex/config.toml"
    dest: ~/.codex/config.toml
    force: no

- name: Copy CLI tool configs
  copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
  loop:
    - src: "{{ playbook_dir }}/../settings/common/jj/config.toml"
      dest: ~/.config/jj/config.toml
    - src: "{{ playbook_dir }}/../settings/common/starship.toml"
      dest: ~/.config/starship.toml
    - src: "{{ playbook_dir }}/../settings/common/zellij/config.kdl"
      dest: ~/.config/zellij/config.kdl
    - src: "{{ playbook_dir }}/../settings/wsl/.config/gh/config.yml"
      dest: ~/.config/gh/config.yml
    - src: "{{ playbook_dir }}/../settings/wsl/.config/opencode/opencode.json"
      dest: ~/.config/opencode/opencode.json

- name: Copy shell configs
  copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
  loop:
    - src: "{{ playbook_dir }}/../settings/wsl/.bashrc.d/custom.sh"
      dest: ~/.bashrc.d/custom.sh
    - src: "{{ playbook_dir }}/../settings/wsl/.gitconfig"
      dest: ~/.gitconfig
